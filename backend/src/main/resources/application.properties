spring.application.name=backend

# --- Datasource (PostgreSQL) ---
# Defaults match docker-compose.yml; override via environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/vocabulary}
spring.datasource.username=${DB_USERNAME:vocabulary}
spring.datasource.password=${DB_PASSWORD:vocabulary}

# --- JPA / Hibernate ---
# Schema is owned by Flyway; Hibernate only validates that entities match it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# Batch lazy/eager collection loads (e.g. Vokabel meanings) instead of one query per row.
spring.jpa.properties.hibernate.default_batch_fetch_size=50
# Batch inserts/updates (e.g. bulk vocabulary import) into grouped JDBC statements.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Application ---
# Comma-separated emails promoted to ADMIN on startup (once they have registered).
app.admin-emails=${ADMIN_EMAILS:}
